<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תשלום</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" id="store-name-display" href="index.html">⚡ TechZone</a>
  <div class="nav-links">
    <a href="cart.html">← חזרה לעגלה</a>
  </div>
</nav>

<div class="page-container" style="max-width:1100px">
  <h1 class="page-title">💳 פרטי משלוח ותשלום</h1>

  <div class="checkout-grid">
    <div>
      <div class="form-box">
        <h3>📦 פרטי משלוח</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label>שם פרטי</label>
            <input type="text" id="fname" placeholder="ישראל">
          </div>
          <div class="form-group">
            <label>שם משפחה</label>
            <input type="text" id="lname" placeholder="ישראלי">
          </div>
        </div>
        <div class="form-group">
          <label>אימייל</label>
          <input type="email" id="email" placeholder="israel@example.com">
        </div>
        <div class="form-group">
          <label>טלפון</label>
          <input type="tel" id="phone" placeholder="050-0000000">
        </div>
        <div class="form-group">
          <label>כתובת</label>
          <input type="text" id="address" placeholder="רחוב הרצל 1">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label>עיר</label>
            <input type="text" id="city" placeholder="תל אביב">
          </div>
          <div class="form-group">
            <label>מיקוד</label>
            <input type="text" id="zip" placeholder="12345">
          </div>
        </div>
      </div>

      <div class="form-box" style="margin-top:1.5rem">
        <h3>💳 פרטי תשלום</h3>
        <div style="background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);border-radius:10px;padding:1rem;margin-bottom:1.2rem;font-size:0.9rem;color:#a78bfa">
          🔒 תשלום מאובטח — הנתונים מוצפנים ומוגנים
        </div>
        <div class="form-group">
          <label>מספר כרטיס</label>
          <input type="text" id="card" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
          <div class="form-group">
            <label>חודש תפוגה</label>
            <select id="exp-month">
              <option value="">חודש</option>
              ${Array.from({length:12},(_,i)=>`<option value="${String(i+1).padStart(2,'0')}">${String(i+1).padStart(2,'0')}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>שנת תפוגה</label>
            <select id="exp-year">
              <option value="">שנה</option>
              ${Array.from({length:8},(_,i)=>`<option value="${2025+i}">${2025+i}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="text" id="cvv" placeholder="123" maxlength="4">
          </div>
        </div>
        <div class="form-group">
          <label>שם בעל הכרטיס</label>
          <input type="text" id="card-name" placeholder="ישראל ישראלי">
        </div>
      </div>

      <div id="error-msg" style="color:#ef4444;padding:1rem 0;font-weight:600;display:none"></div>

      <button class="btn btn-primary" style="width:100%;font-size:1.1rem;margin-top:1rem" onclick="placeOrder()">
        ✅ אשר הזמנה ושלם
      </button>
    </div>

    <div>
      <div class="form-box" id="order-summary-box">
        <h3>📋 סיכום הזמנה</h3>
        <div id="order-items"></div>
        <div class="order-total">
          <span>סה"כ</span>
          <span id="order-total-price" style="color:#a855f7"></span>
        </div>
        <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);color:#94a3b8;font-size:0.85rem">
          🚚 משלוח חינם לכל הארץ!<br>
          📦 אספקה תוך 3-5 ימי עסקים
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <span id="footer-store-name">TechZone</span> — חנות הטק הכי שווה 🚀
</footer>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script>
  function loadStoreInfo() {
    const name = localStorage.getItem('storeName') || 'TechZone';
    document.getElementById('store-name-display').textContent = '⚡ ' + name;
    document.getElementById('footer-store-name').textContent = name;
  }

  function renderSummary() {
    const cart = getCart();
    const itemsDiv = document.getElementById('order-items');
    if (cart.length === 0) {
      window.location.href = 'index.html';
      return;
    }
    itemsDiv.innerHTML = cart.map(i => `
      <div class="order-summary-item">
        <span>${i.emoji} ${i.name} ×${i.qty}</span>
        <span>₪${(i.price * i.qty).toLocaleString()}</span>
      </div>
    `).join('');
    document.getElementById('order-total-price').textContent = '₪' + getCartTotal().toLocaleString();
  }

  function formatCard(input) {
    let val = input.value.replace(/\D/g, '').substring(0, 16);
    input.value = val.replace(/(.{4})/g, '$1 ').trim();
  }

  function placeOrder() {
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const city = document.getElementById('city').value.trim();
    const card = document.getElementById('card').value.trim();

    const errEl = document.getElementById('error-msg');

    if (!fname || !lname || !email || !phone || !address || !city) {
      errEl.textContent = '❌ אנא מלא את כל פרטי המשלוח';
      errEl.style.display = 'block';
      return;
    }
    if (card.replace(/\s/g, '').length < 16) {
      errEl.textContent = '❌ מספר הכרטיס אינו תקין';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';

    const order = {
      id: 'ORD-' + Date.now(),
      date: new Date().toLocaleDateString('he-IL'),
      time: new Date().toLocaleTimeString('he-IL'),
      customer: `${fname} ${lname}`,
      email,
      phone,
      address: `${address}, ${city}`,
      items: getCart(),
      total: getCartTotal(),
      status: 'ממתין לאישור'
    };

    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
    orders.unshift(order);
    localStorage.setItem('orders', JSON.stringify(orders));
    localStorage.setItem('lastOrder', JSON.stringify(order));

    saveCart([]);

    window.location.href = 'success.html';
  }

  loadStoreInfo();
  renderSummary();
</script>
</body>
</html>
