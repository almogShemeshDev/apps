name: Deploy Mage Knight Player Aid

on:
  push:
    branches: [main, master]
    paths: [mage-knight-player-aid/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mage-knight-player-aid/package-lock.json
      - run: npm ci
        working-directory: mage-knight-player-aid
      - run: npm run build
        working-directory: mage-knight-player-aid
      - uses: actions/upload-pages-artifact@v3
        with:
          path: mage-knight-player-aid/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
