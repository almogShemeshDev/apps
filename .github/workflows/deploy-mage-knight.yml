name: Deploy Apps

on:
  push:
    branches: [main, master]
    paths:
      - mage-knight-player-aid/**
      - milky-way/**
      - one-two-tree/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: mage-knight-player-aid
      - run: npm run build
        working-directory: mage-knight-player-aid

      - run: npm ci
        working-directory: milky-way
      - run: npm run build
        working-directory: milky-way

      - run: npm ci
        working-directory: one-two-tree
      - run: npm run build
        working-directory: one-two-tree

      - name: Arrange site structure
        run: |
          mkdir -p _site/mage-knight-player-aid
          mkdir -p _site/milky-way
          mkdir -p _site/one-two-tree
          cp -r mage-knight-player-aid/dist/. _site/mage-knight-player-aid/
          cp -r milky-way/dist/. _site/milky-way/
          cp -r one-two-tree/dist/. _site/one-two-tree/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
